<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atar Noder Neder - Lobby</title>
    
    <!-- ספריית העיצוב Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- פונטים ואייקונים מהשרתים של גוגל -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- חיבור לקובץ התפריט האוטומטי -->
    <script src="navbar.js?v=2" defer></script>
    <script src="header.js" defer></script>
</head>
<body class="bg-slate-100 font-sans antialiased min-h-screen flex m-0 p-0">

    <!-- הסיידבר האוטומטי והיחיד בעמוד! -->
    <my-navbar></my-navbar>

    <!-- תוכן העמוד (הלובי) מוסט שמאלה כדי לפנות מקום לסיידבר -->
    <main dir="rtl" class="flex-1 flex flex-col relative overflow-hidden ml-64">
        <site-header title="Home Page" span="home"></site-header>

        <div class="p-12 overflow-y-auto hide-scrollbar flex-left">
            <div class="mb-10 text-left">
                <h1 class="text-5xl font-serif text-[#8E0045] tracking-tighter">hello friend</h1>
                <p class="text-2xl font-serif text-[#8E0045] mt-2">pick a game and start winning</p>
            </div>
            
                <!-- סטטיסטיקות האתר -->
       
        <div class="mb-10">
        
        <!-- מטריקות עליונות -->
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-emerald-500 border-slate-250 text-right rounded-2xl p-5 flex items-center justify-between shadow-md">
                <button class="flex items-center gap-2 bg-emerald-400 hover:bg-emerald-200 text-white  px-4 py-2.5 rounded-xl font-semibold text-sm whitespace-nowrap transition-all duration-200 shadow-sm hover:shadow-md active:scale-95">
                    <span class="material-symbols-outlined" style="font-size:18px">leaderboard</span>
                    Leaderboard
                </button>
                <div class="flex flex-col text-left w-full">
                    <p class="text-xs text-emerald-900 font-bold uppercase  mb-1">current rank</p>
                    <p class="text-3xl font-bold text-emerald-100">rookie</p>
                </div>
            </div>
            

            <div class="bg-[#2C618D] border-slate-250 text-right rounded-2xl p-5 flex items-center justify-between shadow-md">
                <a href="blackjack.html" class="block">
                    <button class="flex items-center gap-2 bg-[#4079A8] hover:bg-[#88BBE6] text-white  px-4 py-2.5 rounded-xl font-semibold text-sm whitespace-nowrap transition-all duration-200 shadow-sm hover:shadow-md active:scale-95">
                        <span class="material-symbols-outlined" style="font-size:18px">playing_cards</span>
                        See it
                    </button>
                </a>
                <div class="flex flex-col text-left w-full">
                    <p class="text-xs text-emerald-900 font-bold uppercase  mb-1">worth trying</p>
                    <p class="text-3xl font-bold text-emerald-100">BlackJack</p>
                </div>
            </div>


            <div class="bg-[#D66F4B] border-slate-250 text-right rounded-2xl p-5 flex items-center justify-between shadow-md">
                <a href="yahtzee.html" class="block">
                    <button class="flex items-center gap-2 bg-[#F39271] hover:bg-[#F9B097] text-white  px-4 py-2.5 rounded-xl font-semibold text-sm whitespace-nowrap transition-all duration-200 shadow-sm hover:shadow-md active:scale-95">
                        <span class="material-symbols-outlined" style="font-size:18px">casino</span>
                        Transfer
                    </button>
                </a>
                <div class="flex flex-col text-left w-full">
                    <p class="text-xs text-emerald-900 font-bold uppercase  mb-1">your favorite</p>
                    <p class="text-3xl font-bold text-emerald-100">Yahtzee</p>
                </div>
            </div>


            <div class="bg-[#D9465F] border-slate-250 text-right rounded-2xl p-5 flex items-center justify-between shadow-md">
                <a href="minesweeper.html" class="block">
                    <button class="flex items-center gap-2 bg-[#DD6E81] hover:bg-[#E68898] text-white  px-4 py-2.5 rounded-xl font-semibold text-sm whitespace-nowrap transition-all duration-200 shadow-sm hover:shadow-md active:scale-95">
                        <span class="material-symbols-outlined" style="font-size:18px">brightness_high</span>
                        Play
                    </button>
                </a>
                <div class="flex flex-col text-left w-full">
                     <p class="text-xs text-emerald-900 font-bold uppercase  mb-1">most popular</p>
                    <p class="text-2xl font-bold text-emerald-100">Minesweeper</p>
                </div>
            </div>
        </div>

        <!-- גרפים -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/30 rounded-2xl p-5">
            <p class="text-xs font-medium text-emerald-900 uppercase tracking-wide mb-3">פופולריות לפי משחק</p>
            <canvas id="barChart" height="180"></canvas>
            </div>
            <div class="bg-white/30 rounded-2xl p-5">
            <p class="text-xs font-medium text-emerald-900 uppercase tracking-wide mb-3">זמן משחק ממוצע (דקות)</p>
            <canvas id="timeChart" height="180"></canvas>
            </div>
        </div>
        </div>

        <!-- Chart.js -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script>
        const games = ['Wordle','Blackjack','Minesweeper','Yahtzee'];
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels: games, datasets: [{ data: [38,27,21,14], backgroundColor: ['#1D9E75','#8E0045','#378ADD','#BA7517'], borderRadius: 6 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => v+'%' }, max: 50 }, x: { grid: { display: false } } } }
        });
        new Chart(document.getElementById('timeChart'), {
            type: 'bar',
            data: { labels: games, datasets: [{ data: [4,8,10,6], backgroundColor: '#534AB7', borderRadius: 6 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => v+" דק'" }, max: 14 }, x: { grid: { display: false } } } }
        });
        </script>
    </main>

</body>
</html>
